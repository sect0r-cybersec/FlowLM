appId: com.flowlm.desktop
productName: FlowLM
copyright: Copyright © 2026 Sam

directories:
  output: dist
  buildResources: build

# This app bundles everything via Vite and ships zero runtime node_modules, so
# electron-builder must NOT run its "install production dependencies" step. In an
# npm-workspaces monorepo that step runs the package manager in production mode
# against the hoisted root node_modules, which prunes devDependencies — including
# electron-builder's own app-builder-bin helper — and then fails to spawn it
# (spawn .../app-builder-bin/<platform>/app-builder ENOENT). Disabling the
# native-rebuild step skips that entirely. Verified on Linux + Windows CI.
npmRebuild: false

# The app is fully self-contained after `electron-vite build`:
# - renderer (incl. @flowlm/core and all UI deps) is bundled by Vite into out/renderer
# - main/preload import only electron + node built-ins, so there are no runtime
#   node_modules to ship. Excluding node_modules keeps the package small and avoids
#   following the @flowlm/core workspace symlink.
files:
  - out/**/*
  - package.json
  - '!node_modules/**/*'

win:
  target:
    - nsis
    - portable

# Per-target names so the installer and the portable exe don't overwrite each
# other (both default to the same filename otherwise).
#
# allowToChangeInstallationDirectory is off so every run installs to the same
# fixed per-user location. Re-running the installer then upgrades the existing
# installation in place (electron-builder detects it via the appId) instead of
# leaving a second copy behind.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

portable:
  artifactName: ${productName}-${version}-${arch}-portable.${ext}

linux:
  target:
    - AppImage
  category: Graphics
  artifactName: ${productName}-${version}-${arch}.${ext}
