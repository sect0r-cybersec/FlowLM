<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowLM">
  <title>FlowLM</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2D36"/>
      <stop offset="1" stop-color="#1B1C1E"/>
    </linearGradient>
    <linearGradient id="violet" gradientUnits="userSpaceOnUse" x1="90" y1="100" x2="430" y2="420">
      <stop offset="0" stop-color="#9C7DF6"/>
      <stop offset="0.55" stop-color="#7C5CDB"/>
      <stop offset="1" stop-color="#6242C2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#7C5CDB" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#7C5CDB" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g id="background">
    <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
    <rect width="512" height="512" rx="112" fill="url(#glow)"/>
    <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>
  </g>

  <g id="connectors" fill="none" stroke="url(#violet)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 192 V258"/>
    <path d="M150 258 H362"/>
    <path d="M156 258 V310"/>
    <path d="M356 258 V310"/>
  </g>

  <g id="arrowheads" fill="url(#violet)">
    <path d="M142 302 H170 L156 320 Z"/>
    <path d="M342 302 H370 L356 320 Z"/>
    <circle cx="256" cy="258" r="9"/>
  </g>

  <g id="nodes" filter="url(#soft)">
    <rect id="node-source"      x="196" y="100" width="120" height="92" rx="26" fill="url(#violet)"/>
    <rect id="node-child-left"  x="96"  y="320" width="120" height="92" rx="26" fill="url(#violet)"/>
    <rect id="node-child-right" x="296" y="320" width="120" height="92" rx="26" fill="#D6CDF0"/>
  </g>
</svg>
